<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>도쿄가이드</title>
  <script>
    // SPA fallback for GitHub Pages: redirect any unknown path back to the
    // project root, preserving the hash route.
    (function () {
      var seg = location.pathname.split('/').filter(Boolean)[0] || '';
      var base = seg ? '/' + seg + '/' : '/';
      location.replace(base + (location.hash || ''));
    })();
  </script>
</head>

</html>
